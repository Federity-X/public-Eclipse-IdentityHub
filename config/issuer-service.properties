# ===========================================================================
# Eclipse EDC Issuer Service — runtime configuration
# Launcher: launcher:issuer-service (issuerservice-bom + issuerservice-feature-sql-bom)
# Role:     DCP issuer (issuance, admin, status list, credential definitions)
# ===========================================================================

# ---------------------------------------------------------------------------
# Runtime identity
# ---------------------------------------------------------------------------
edc.hostname=issuer-service
edc.connector.name=issuer-service

# ---------------------------------------------------------------------------
# Default HTTP API (health / readiness)
# ---------------------------------------------------------------------------
web.http.port=8080
web.http.path=/api

# ---------------------------------------------------------------------------
# Issuer Admin API
# ---------------------------------------------------------------------------
web.http.issueradmin.port=15152
web.http.issueradmin.path=/api/issuer

# ---------------------------------------------------------------------------
# DCP Issuance API
# ---------------------------------------------------------------------------
web.http.issuance.port=13132
web.http.issuance.path=/api/issuance

# ---------------------------------------------------------------------------
# StatusList credential endpoint
# ---------------------------------------------------------------------------
web.http.statuslist.port=9999
web.http.statuslist.path=/statuslist

# ---------------------------------------------------------------------------
# Identity API (issuer also exposes participant-context-api)
# ---------------------------------------------------------------------------
web.http.identity.port=15153
web.http.identity.path=/api/identity

# ---------------------------------------------------------------------------
# DID web endpoint
# ---------------------------------------------------------------------------
web.http.did.port=10101
web.http.did.path=/

# ---------------------------------------------------------------------------
# STS (issuer)
# ---------------------------------------------------------------------------
web.http.sts.port=9293
web.http.sts.path=/api/sts

# ---------------------------------------------------------------------------
# API authentication
# ---------------------------------------------------------------------------
edc.api.auth.key=${EDC_API_AUTH_KEY:c3VwZXItc2VjcmV0LWFwaS1rZXk=}

# ---------------------------------------------------------------------------
# PostgreSQL — default datasource (separate database for issuer-service)
# ---------------------------------------------------------------------------
edc.datasource.default.url=jdbc:postgresql://pg-identityhub:5432/issuerservice
edc.datasource.default.user=ih
edc.datasource.default.password=ihpass

# Auto-create SQL schema on startup
edc.sql.schema.autocreate=true

# SQL stores — all use "default" datasource
edc.sql.store.didresource.datasource=default
edc.sql.store.credentials.datasource=default
edc.sql.store.keypair.datasource=default
edc.sql.store.stsclient.datasource=default
edc.sql.store.issuanceprocess.datasource=default
edc.sql.store.holder.datasource=default
edc.sql.store.attestationdefinitions.datasource=default
edc.sql.store.credentialdefinitions.datasource=default

# ---------------------------------------------------------------------------
# DID / Issuer configuration
# ---------------------------------------------------------------------------
edc.iam.issuer.id=did:web:issuer-service%3A10101
edc.iam.did.web.use.https=false

# DID web host for auto-generated admin participant DID
edc.ih.admin.seed.did.web.host=localhost%3A10101
# Use a different admin ID to avoid vault key collision with IdentityHub's super-admin
edc.ih.admin.seed.participantId=issuer-admin

# ---------------------------------------------------------------------------
# STS — embedded Secure Token Service keys
# ---------------------------------------------------------------------------
edc.iam.sts.publickey.id=issuer-key
edc.iam.sts.privatekey.alias=issuer-alias
edc.iam.sts.token.expiration=5

# ---------------------------------------------------------------------------
# Access-token replay protection
# ---------------------------------------------------------------------------
edc.iam.accesstoken.jti.validation=true

# ---------------------------------------------------------------------------
# StatusList callback — externally-reachable URL for status list credentials
# ---------------------------------------------------------------------------
edc.statuslist.callback.address=http://issuer-service:9999/statuslist

# ---------------------------------------------------------------------------
# Issuance state machine
# ---------------------------------------------------------------------------
edc.issuance.anonymous.allowed=false

# ---------------------------------------------------------------------------
# Vault — HashiCorp Vault (shared with EDC Connectors on edc-shared network)
# See: https://github.com/eclipse-edc/Connector/discussions/4200
# ---------------------------------------------------------------------------
edc.vault.hashicorp.url=http://vault:8200
# Overridden at runtime by EDC_VAULT_HASHICORP_TOKEN from the shared vault-token volume.
# The EDC Connector stack generates a random root token on each startup.
edc.vault.hashicorp.token=OVERRIDE_VIA_ENV
edc.vault.hashicorp.api.secret.path=/v1/secret
# Allow partition fallback so partitioned secrets (per participant context)
# are stored/read from the default vault path.
edc.vault.hashicorp.allow-fallback=true
edc.vault.hashicorp.health.check.enabled=true

# ---------------------------------------------------------------------------
# Encryption
# ---------------------------------------------------------------------------
edc.encryption.strict=false

# ---------------------------------------------------------------------------
# Health checks
# ---------------------------------------------------------------------------
edc.core.system.health.check.liveness-period=30
edc.core.system.health.check.readiness-period=30
edc.core.system.health.check.startup-period=30
