# ===========================================================================
# Eclipse EDC IdentityHub — runtime configuration
# Launcher: launcher:identityhub (identityhub-bom + identityhub-feature-sql-bom)
# Role:     DCP wallet (presentation, credential storage, STS, identity admin)
#
# NOTE: This codebase separates wallet and issuer into two runtimes.
#       The issuer is configured in config/issuer-service.properties.
#       There is no "dcp.role" property — role is determined by which
#       BOM / launcher is used.
# ===========================================================================

# ---------------------------------------------------------------------------
# Runtime identity
# ---------------------------------------------------------------------------
edc.hostname=identityhub
edc.connector.name=identityhub

# ---------------------------------------------------------------------------
# Default HTTP API (health / readiness)
# ---------------------------------------------------------------------------
web.http.port=8080
web.http.path=/api

# ---------------------------------------------------------------------------
# Identity Admin API
# ---------------------------------------------------------------------------
web.http.identity.port=15151
web.http.identity.path=/api/identity

# ---------------------------------------------------------------------------
# DCP Credentials / Presentation API
# ---------------------------------------------------------------------------
web.http.credentials.port=13131
web.http.credentials.path=/api/credentials

# ---------------------------------------------------------------------------
# DID web endpoint (local DID publisher)
# ---------------------------------------------------------------------------
web.http.did.port=10100
web.http.did.path=/

# ---------------------------------------------------------------------------
# Secure Token Service (embedded STS)
# ---------------------------------------------------------------------------
web.http.sts.port=9292
web.http.sts.path=/api/sts

# ---------------------------------------------------------------------------
# API authentication (token-based, identityhub-bom default)
# ---------------------------------------------------------------------------
edc.api.auth.key=${EDC_API_AUTH_KEY:c3VwZXItc2VjcmV0LWFwaS1rZXk=}

# ---------------------------------------------------------------------------
# PostgreSQL — default datasource (shared with issuer-service)
# ---------------------------------------------------------------------------
edc.datasource.default.url=jdbc:postgresql://pg-identityhub:5432/identityhub
edc.datasource.default.user=ih
edc.datasource.default.password=ihpass

# Auto-create SQL schema on startup
edc.sql.schema.autocreate=true

# All SQL stores use the "default" datasource (explicit for clarity)
edc.sql.store.didresource.datasource=default
edc.sql.store.credentials.datasource=default
edc.sql.store.keypair.datasource=default
edc.sql.store.credentialrequest.datasource=default
edc.sql.store.stsclient.datasource=default

# ---------------------------------------------------------------------------
# DID / Issuer configuration
# ---------------------------------------------------------------------------
# The issuer DID — used by the IdentityHub when it issues self-signed tokens.
# In production replace with the real did:web anchored to your public domain.
edc.iam.issuer.id=did:web:identityhub%3A10100

# DID web host for auto-generated admin participant DID.
# For local/host testing use localhost; for Docker-to-Docker use the container name.
edc.ih.admin.seed.did.web.host=localhost%3A10100

# Disable HTTPS for did:web in local/dev (default is true in production)
edc.iam.did.web.use.https=false

# ---------------------------------------------------------------------------
# STS — embedded Secure Token Service keys
# ---------------------------------------------------------------------------
# Public key ID advertised in DID documents / JWKs
edc.iam.sts.publickey.id=identityhub-key
# Alias under which the private key is stored in the vault
edc.iam.sts.privatekey.alias=identityhub-alias
# Token expiration (minutes)
edc.iam.sts.token.expiration=5

# ---------------------------------------------------------------------------
# Access-token replay protection
# ---------------------------------------------------------------------------
edc.iam.accesstoken.jti.validation=true

# ---------------------------------------------------------------------------
# Credential watchdog — periodic status check for stored credentials
# ---------------------------------------------------------------------------
edc.iam.credential.status.check.period=60
edc.iam.credential.status.check.delay=10
edc.iam.credential.renewal.graceperiod=604800
edc.iam.credential.revocation.mimetype=*/*

# ---------------------------------------------------------------------------
# Vault — HashiCorp Vault (shared with EDC Connectors on edc-shared network)
# See: https://github.com/eclipse-edc/Connector/discussions/4200
# ---------------------------------------------------------------------------
edc.vault.hashicorp.url=http://vault:8200
# Overridden at runtime by EDC_VAULT_HASHICORP_TOKEN from the shared vault-token volume.
# The EDC Connector stack generates a random root token on each startup.
edc.vault.hashicorp.token=OVERRIDE_VIA_ENV
edc.vault.hashicorp.api.secret.path=/v1/secret
# Allow partition fallback so partitioned secrets (per participant context)
# are stored/read from the default vault path.
edc.vault.hashicorp.allow-fallback=true
edc.vault.hashicorp.health.check.enabled=true

# ---------------------------------------------------------------------------
# Encryption
# ---------------------------------------------------------------------------
# Relax strict encryption for local/dev; set to true in production
edc.encryption.strict=false

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
# EDC uses java.util.logging bridged to the SLF4J/Logback stack.
# Set via JVM system property or environment variable:
#   -Dorg.slf4j.simpleLogger.defaultLogLevel=INFO
# The following is recognised by the EDC Monitor implementation:
edc.core.system.health.check.liveness-period=30
edc.core.system.health.check.readiness-period=30
edc.core.system.health.check.startup-period=30
